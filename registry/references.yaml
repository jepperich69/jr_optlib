# Trusted reference implementations for differential oracles. Schema: registry/SCHEMA.md
# These are independent, widely-used implementations used ONLY to cross-check
# jr_optlib functions -- never as the shipped implementation.

- id: ref.ipf_logspace
  name: Log-space raking (in-house independent)
  kind: reference
  summary: IPF reimplemented in additive log-space with scipy.special.logsumexp.
  tags: [transport, ipf, differential]
  status: vetted
  source: jr_optlib.oracles.transport._reference_ipf_logspace
  added: 2026-07-02
  provenance: Different numerical route (additive/logsumexp) from ipf_2d's multiplicative sweep; agreement is a genuine differential test.
  backend: custom
  validates: [transport.ipf_2d]
  import: "from jr_optlib.oracles.transport import ipf_reference"

