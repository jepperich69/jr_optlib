- id: transport.solve_transport_opt
  name: Exact min-cost transport
  kind: function
  summary: Exact min-cost transportation LP (integral by TU); returns (X, obj, time).
  tags: [transport, min-cost-flow, exact, lp]
  status: vetted
  source: Pub_MIPEntropy_MPC/code/mip_hybrid/apps/population_transport.py (numerics-preserving migration)
  added: 2026-07-02
  provenance: >
    Migration verified vs old copy on objective+feasibility (LP is degenerate so
    the plan is not unique; cost is). Certified optimal by certify_transport
    against an independent scipy.linprog reference. Backend: ortools GLOP if
    available, else pulp/CBC.
  module: jr_optlib.transport.lp_transport
  signature: "solve_transport_opt(a, b, C) -> (X, obj, elapsed)"
  oracles: [transport.certify_transport, transport.transport_optimal_cost]
  tests: tests/test_lp_transport.py
  certifies: true

