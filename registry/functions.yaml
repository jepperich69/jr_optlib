# Vetted functions. Schema: registry/SCHEMA.md
# A `vetted` entry MUST list at least one oracle.

- id: transport.ipf_2d
  name: IPF / raking (2D)
  kind: function
  summary: Iterative Proportional Fitting -- KL I-projection of a seed onto given row/column marginals.
  tags: [transport, population-synthesis, matrix-scaling, ipf, furness, raking, entropy]
  status: vetted
  source: Pub_MIPEntropy_MPC/code/mip_hybrid/apps/population_transport.py (numerics-preserving extraction)
  added: 2026-07-02
  provenance: >
    Certified by two independent properties that jointly determine the unique
    solution (matrix scaling / Sinkhorn 1967): matching marginals
    (marginal_residual) and diagonal-scaling form (ipf_scaling_form). Also
    cross-checked against an independent log-space raking (ipf_reference).
    16 oracle-backed tests pass (tests/test_ipf.py).
  module: jr_optlib.transport.ipf
  signature: "ipf_2d(row_marg, col_marg, q=None, iters=1000, tol=1e-9) -> (X, elapsed)"
  oracles: [transport.marginal_residual, transport.ipf_scaling_form, transport.ipf_reference]
  tests: tests/test_ipf.py
  certifies: true

- id: transport.sinkhorn_balanced
  name: Sinkhorn (entropic OT, balanced)
  kind: function
  summary: Entropic optimal transport via Sinkhorn scaling of K=exp(-C/tau); returns the coupling.
  tags: [transport, optimal-transport, sinkhorn, entropic, matrix-scaling]
  status: vetted
  source: Pub_MIPEntropy_MPC/code/mip_hybrid/apps/population_transport.py (numerics-preserving migration)
  added: 2026-07-02
  provenance: >
    Migration verified bit-for-bit against the old paper copy on the paper's
    own instances (tests/test_sinkhorn.py::test_migration_matches_old_copy, 18
    cases). Certified by certify_sinkhorn: matching marginals + diagonal-scaling
    form relative to K=exp(-C/tau) uniquely determine the entropic-OT plan.
  module: jr_optlib.transport.sinkhorn
  signature: "sinkhorn_balanced(a, b, C, tau=0.05, iters=500, tol=1e-9) -> (X, elapsed)"
  oracles: [transport.certify_sinkhorn, transport.marginal_residual, transport.ipf_scaling_form]
  tests: tests/test_sinkhorn.py
  certifies: true

